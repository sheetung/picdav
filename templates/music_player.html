<!-- ════════════════════════════════════════════════════
     Music Player Widget — floating bottom-right player
     Uses APlayer.js + NetEase Cloud Music API proxy
     ════════════════════════════════════════════════════ -->

<style>
/* ── widget 全局容器 ── */
#music-widget {
    font-family: 'Inter', system-ui, sans-serif;
    pointer-events: none;
}
#music-widget > * {
    pointer-events: auto;
}

/* ── FAB ── */
#music-widget-fab {
    position: fixed;
    bottom: 76px;
    right: 20px;
    z-index: 999;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 2px 12px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s, opacity .25s;
    color: #191b23;
}
#music-widget-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 18px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
}
#music-widget-fab .material-symbols-outlined {
    font-size: 22px;
}
/* FAB 指示点（未配置/错误时红点） */
#music-widget-dot {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #22c55e;
    border: 2px solid var(--color-surface-container-lowest, #fff);
    transition: background .3s;
}
#music-widget-dot.error { background: #ef4444; }
#music-widget-dot.off   { background: #f59e0b; }

/* ── 面板 ── */
#music-widget-panel {
    position: fixed;
    bottom: 134px;
    right: 20px;
    z-index: 1000;
    width: 360px;
    max-height: 500px;
    border-radius: 16px;
    background: rgba(255,255,255,0.50);
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.45);
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
    overflow: hidden;
    display: none;
    flex-direction: column;
    transform-origin: bottom right;
    animation: music-slide-up .25s cubic-bezier(.22,.61,.36,1);
}
#music-widget-panel.open { display: flex; }

@keyframes music-slide-up {
    from { opacity: 0; transform: translateY(12px) scale(.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── 面板头部 ── */
.music-widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
    border-bottom: 1px solid rgba(0,0,0,.06);
    flex-shrink: 0;
}
.music-widget-header-title {
    font-size: 13px;
    font-weight: 600;
    color: #191b23;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
}
.music-widget-header-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
}
.music-widget-header-actions button {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    background: rgba(0,0,0,.04);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #434655;
    transition: background .15s;
}
.music-widget-header-actions button:hover {
    background: rgba(0,0,0,.08);
}
.music-widget-header-actions .material-symbols-outlined {
    font-size: 18px;
}

/* ── APlayer 容器 ── */
#music-widget-aplayer-wrap {
    flex: 1;
    overflow-y: auto;
    min-height: 80px;
}

/* ── 空状态 / 消息 ── */
.music-widget-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    text-align: center;
    color: #6b7280;
    font-size: 13px;
    gap: 8px;
}
.music-widget-msg .material-symbols-outlined {
    font-size: 32px;
    opacity: .5;
}
.music-widget-msg a {
    color: #004ac6;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
}

/* ── 面板 backdrop（点击外部关闭面板，不依赖 contains） ── */
#music-widget-backdrop {
    position: fixed;
    inset: 0;
    z-index: 997;
    background: transparent;
    display: none;
}
#music-widget-backdrop.open { display: block; }

/* ── 配置覆盖层 ── */
#music-widget-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(0,0,0,.30);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
}
#music-widget-overlay.open { display: flex; }

.music-widget-dialog {
    background: rgba(255,255,255,0.70);
    backdrop-filter: blur(24px) saturate(1.3);
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.5);
    color: #191b23;
    border-radius: 16px;
    padding: 24px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,0.6);
    animation: music-slide-up .2s ease;
}
.music-widget-dialog h3 {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 4px;
}
.music-widget-dialog p {
    font-size: 13px;
    color: #6b7280;
    margin: 0 0 16px;
    line-height: 1.5;
}
.music-widget-dialog input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
    background: rgba(255,255,255,0.35);
    color: #191b23;
    transition: border-color .2s;
}
.music-widget-dialog input:focus {
    border-color: #004ac6;
    box-shadow: 0 0 0 3px rgba(0,74,198,.12);
}
.music-widget-dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 16px;
}
.music-widget-dialog-actions button {
    padding: 8px 20px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
}
.music-widget-dialog-actions .btn-cancel {
    background: rgba(0,0,0,.06);
    color: #191b23;
}
.music-widget-dialog-actions .btn-primary {
    background: #004ac6;
    color: #fff;
}

/* ── 响应式适配 ── */
@media (max-width: 480px) {
    #music-widget-panel {
        width: calc(100vw - 32px);
        right: 16px;
        bottom: 130px;
    }
}

/* ════════════════════════════════════════════════════
   Widget 自身暗色主题（自包含，不依赖模板变量）
   ════════════════════════════════════════════════════ */

html.dark #music-widget-panel {

html.dark .music-widget-header {

html.dark .music-widget-header-title {

}
html.dark .music-widget-header-actions button {

</style>

<!-- ═══ Widget DOM ═══ -->
<div id="music-widget-backdrop"></div>
<div id="music-widget">
    <!-- FAB -->
    <button id="music-widget-fab" onclick="MusicPlayer.toggle()" title="音乐播放器">
        <span class="material-symbols-outlined">music_note</span>
        <span id="music-widget-dot"></span>
    </button>

    <!-- 面板 -->
    <div id="music-widget-panel">
        <div class="music-widget-header">
            <span class="music-widget-header-title" id="music-widget-title">音乐播放器</span>
            <div class="music-widget-header-actions">
                <button onclick="MusicPlayer.showConfig()" title="配置歌单">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <button onclick="MusicPlayer.toggle()" title="收起">
                    <span class="material-symbols-outlined">expand_more</span>
                </button>
            </div>
        </div>
        <div id="music-widget-aplayer-wrap">
            <div id="music-widget-msg" class="music-widget-msg">
                <span class="material-symbols-outlined">library_music</span>
                <div>
                    点击 <a onclick="MusicPlayer.showConfig()">⚙ 设置</a> 配置网易云歌单
                </div>
            </div>
            <div id="music-widget-aplayer" style="display:none"></div>
        </div>
    </div>
</div>

<!-- 配置对话框 -->
<div id="music-widget-overlay">
    <div class="music-widget-dialog">
        <h3>配置音乐播放器</h3>
        <p>
            请输入网易云音乐歌单 ID，或粘贴完整的歌单分享链接。<br>
            例如：<code>123456789</code> 或 <code>https://music.163.com/playlist?id=123456789</code>
        </p>
        <input type="text" id="music-widget-input" placeholder="歌单 ID 或分享链接..." spellcheck="false" autocomplete="off">
        <div class="music-widget-dialog-actions">
            <button class="btn-cancel" onclick="MusicPlayer.hideConfig()">取消</button>
            <button class="btn-primary" onclick="MusicPlayer.saveConfig()">保存</button>
        </div>
    </div>
</div>


<!-- ═══ Widget JS ═══ -->
<script>
(function() {
    'use strict';

    // ── 加载 APlayer ──
    function loadAPlayer(cb) {
        if (typeof APlayer !== 'undefined') { cb(); return; }
        // CSS
        if (!document.querySelector('link[href*="APlayer.min.css"]')) {
            var l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = 'https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.css';
            document.head.appendChild(l);
        }
        // JS
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/aplayer/1.10.1/APlayer.min.js';
        s.onload = cb;
        s.onerror = function() {
            // 回退备用 CDN
            var s2 = document.createElement('script');
            s2.src = 'https://cdn.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js';
            s2.onload = cb;
            document.body.appendChild(s2);
        };
        document.body.appendChild(s);
    }

    // ── 本地存储键 ──
    var STORAGE_KEY = 'music-playlist-id';
    var DEFAULT_PLAYLIST = '5104642557';

    // ── DOM refs ──
    var $ = function(id) { return document.getElementById(id); };
    var fab = $('music-widget-fab');
    var dot = $('music-widget-dot');
    var panel = $('music-widget-panel');
    var title = $('music-widget-title');
    var aplayerWrap = $('music-widget-aplayer');
    var msg = $('music-widget-msg');
    var overlay = $('music-widget-overlay');
    var input = $('music-widget-input');

    var backdrop = $('music-widget-backdrop');
    var ap = null;
    var isOpen = false;

    // ── 主题色 ──
    function themeColor() {
        return document.documentElement.classList.contains('dark') ? '#8ab4ff' : '#004ac6';
    }

    // ── 提取歌单 ID ──
    function extractPlaylistId(str) {
        str = str.trim();
        // 纯数字
        if (/^\d+$/.test(str)) return str;
        // URL 中的 id 参数
        var m = str.match(/[?&]id=(\d+)/);
        if (m) return m[1];
        // 路径中的数字
        m = str.match(/playlist\/(\d+)/);
        if (m) return m[1];
        return null;
    }

    // ── 创建 / 重建 APlayer ──
    function buildPlayer(songs) {
        if (ap) { ap.destroy(); ap = null; }
        if (!songs || songs.length === 0) {
            showMessage('歌单为空');
            return;
        }

        aplayerWrap.style.display = '';
        msg.style.display = 'none';

        var audio = songs.map(function(s) {
            return {
                name: s.name,
                artist: s.artist,
                url: '/api/music/song/' + s.id + '?_key=' + encodeURIComponent(window.API_TOKEN || ''),
                cover: s.cover || 'https://p1.music.126.net/8gDxPM2jHgtkn_WXBxoERg==/109951169400089450.jpg',
            };
        });

        ap = new APlayer({
            container: aplayerWrap,
            fixed: false,
            mini: false,
            autoplay: false,
            theme: themeColor(),
            loop: 'all',
            order: 'list',
            preload: 'none',
            volume: parseFloat(localStorage.getItem('music-volume') || '0.7'),
            mutex: true,
            listFolded: false,
            listMaxHeight: '180px',
            audio: audio,
        });

        // 记住音量
        ap.on('volumechange', function() {
            try { localStorage.setItem('music-volume', ap.volume); } catch(e) {}
        });

        updateDot('on');
        title.textContent = audio[0] ? ('♫ ' + songs.length + ' 首') : '音乐播放器';
    }

    // ── 显示消息 ──
    function showMessage(text) {
        aplayerWrap.style.display = 'none';
        msg.style.display = 'flex';
        msg.innerHTML =
            '<span class="material-symbols-outlined">info</span>' +
            '<div>' + text + '</div>';
    }

    function showLoading() {
        aplayerWrap.style.display = 'none';
        msg.style.display = 'flex';
        msg.innerHTML =
            '<span class="material-symbols-outlined" style="animation:spin 1s linear infinite">sync</span>' +
            '<div>加载歌单中...</div>';
        // 加一下 spin keyframe
        if (!document.getElementById('music-spin-style')) {
            var st = document.createElement('style');
            st.id = 'music-spin-style';
            st.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
            document.head.appendChild(st);
        }
    }

    function showError(text) {
        aplayerWrap.style.display = 'none';
        msg.style.display = 'flex';
        msg.innerHTML =
            '<span class="material-symbols-outlined" style="opacity:.7">error_outline</span>' +
            '<div>' + text + '<br><a onclick="MusicPlayer.load()">重试</a></div>';
        updateDot('error');
    }

    // ── 指示点 ──
    function updateDot(state) {
        dot.className = state;
    }

    // ── 加载歌单 ──
    function loadPlaylist(playlistId) {
        if (!playlistId) {
            showMessage('点击 ⚙ 配置歌单');
            updateDot('off');
            title.textContent = '音乐播放器';
            return;
        }

        showLoading();
        updateDot('off');
        title.textContent = '加载中...';

        fetch('/api/music/playlist?id=' + encodeURIComponent(playlistId) + '&_key=' + encodeURIComponent(window.API_TOKEN || ''))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    showError(data.error);
                    return;
                }
                if (!data.songs || data.songs.length === 0) {
                    showMessage('歌单 "' + (data.name || '') + '" 为空');
                    updateDot('off');
                    return;
                }
                buildPlayer(data.songs);
                // 保存播放列表名称
                try { localStorage.setItem('music-playlist-name', data.name); } catch(e) {}
            })
            .catch(function(err) {
                showError('加载失败: ' + (err.message || '网络错误'));
            });
    }

    // ── 公开 API ──
    window.MusicPlayer = {
        toggle: function() {
            isOpen = !isOpen;
            panel.classList.toggle('open', isOpen);
            backdrop.classList.toggle('open', isOpen);
            if (isOpen && !ap) {
                // 尝试自动加载已保存的歌单
                var saved = null;
                try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
                if (saved) loadPlaylist(extractPlaylistId(saved));
            }
        },

        showConfig: function() {
            isOpen = true;
            panel.classList.add('open');
            backdrop.classList.add('open');
            var saved = '';
            try { saved = localStorage.getItem(STORAGE_KEY) || ''; } catch(e) {}
            input.value = saved;
            overlay.classList.add('open');
            setTimeout(function() { input.focus(); }, 100);
        },

        hideConfig: function() {
            overlay.classList.remove('open');
        },

        saveConfig: function() {
            var raw = input.value.trim();
            var id = extractPlaylistId(raw);
            if (!id) {
                input.style.borderColor = '#ef4444';
                setTimeout(function() { input.style.borderColor = ''; }, 1500);
                return;
            }
            try { localStorage.setItem(STORAGE_KEY, id); } catch(e) {}
            MusicPlayer.hideConfig();
            loadPlaylist(id);
        },

        load: function() {
            var saved = null;
            try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
            if (saved) loadPlaylist(extractPlaylistId(saved));
        },
    };

    // 点击 backdrop → 关闭面板
    backdrop.addEventListener('click', function() {
        isOpen = false;
        panel.classList.remove('open');
        backdrop.classList.remove('open');
    });

    // ── 初始化 ──
    loadAPlayer(function() {
        var saved = null;
        try { saved = localStorage.getItem(STORAGE_KEY); } catch(e) {}
        if (saved) {
            loadPlaylist(extractPlaylistId(saved));
            updateDot('on');
        } else {
            // 首次使用：用默认歌单
            try { localStorage.setItem(STORAGE_KEY, DEFAULT_PLAYLIST); } catch(e) {}
            loadPlaylist(DEFAULT_PLAYLIST);
            updateDot('on');
        }
    });

})();
</script>
